name: Keep Codespace Alive

on:
  schedule:
    - cron: '*/5 * * * *'  # كل 5 دقايق
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Codespace
        run: |
          curl -s -X POST \
            -H "Authorization: token ${{ secrets.CODESPACE_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/user/codespaces/${{ secrets.CODESPACE_NAME }}/start
